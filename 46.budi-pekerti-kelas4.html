<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi Pekerti Kelas 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Budi Pekerti Kelas 4</h1>
        <p>Kerjakan soal berikut:</p>
    </header>

    <main>
        <!-- Soal 1 -->
        <div class="soal">
            <label for="soal1">1. Apa yang dimaksud dengan saling menghargai sesama teman?</label>
            <input type="text" id="soal1">
            <button data-answer="Menghormati pendapat dan hak teman-teman kita">Cek Jawaban</button>
        </div>

        <!-- Soal 2 -->
        <div class="soal">
            <label for="soal2">2. Jika kita melakukan kesalahan, apa yang sebaiknya kita lakukan?</label>
            <input type="text" id="soal2">
            <button data-answer="Minta maaf dan belajar dari kesalahan">Cek Jawaban</button>
        </div>

        <!-- Soal 3 -->
        <div class="soal">
            <label for="soal3">3. Mengapa kita perlu berperilaku jujur di sekolah?</label>
            <input type="text" id="soal3">
            <button data-answer="Karena kejujuran membuat kita dihormati orang lain">Cek Jawaban</button>
        </div>

        <!-- Soal 4 -->
        <div class="soal">
            <label for="soal4">4. Bagaimana cara menolong teman yang sedang kesulitan belajar?</label>
            <input type="text" id="soal4">
            <button data-answer="Membantu menjelaskan pelajaran dengan sabar">Cek Jawaban</button>
        </div>

        <!-- Soal 5 -->
        <div class="soal">
            <label for="soal5">5. Sebutkan contoh sikap sopan santun di sekolah!</label>
            <input type="text" id="soal5">
            <button data-answer="Menyapa guru, tidak membuang sampah sembarangan, tidak memotong pembicaraan orang">Cek Jawaban</button>
        </div>

        <!-- Soal 6 -->
        <div class="soal">
            <label for="soal6">6. Mengapa kita harus bekerja sama dalam kelompok?</label>
            <input type="text" id="soal6">
            <button data-answer="Agar tugas kelompok bisa selesai dengan baik dan cepat">Cek Jawaban</button>
        </div>

        <!-- Soal 7 -->
        <div class="soal">
            <label for="soal7">7. Apa yang harus dilakukan jika melihat teman bertengkar?</label>
            <input type="text" id="soal7">
            <button data-answer="Mendamaikan dan menasihati teman untuk tidak bertengkar">Cek Jawaban</button>
        </div>
    </main>

    <footer>
        <a href="budi-pekerti.html">Kembali ke Budi Pekerti</a>
        <a href="index.html">Kembali ke Menu Utama</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>

    <script src="script.js"></script>
</body>
</html>
