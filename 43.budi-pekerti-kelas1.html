<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi Pekerti Kelas 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Budi Pekerti Kelas 1</h1>
        <p>Kerjakan soal berikut:</p>
    </header>

    <main>
        <div class="soal">
            <label for="soal1">1. Apa yang harus kita lakukan jika ada teman yang terjatuh?</label>
            <input type="text" id="soal1">
            <button data-answer="Bantu teman yang jatuh">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal2">2. Jika ada teman yang menangis, apa yang bisa kita lakukan?</label>
            <input type="text" id="soal2">
            <button data-answer="Menanyakan apa yang terjadi dan menghibur">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal3">3. Mengapa kita harus menyapa teman dengan baik?</label>
            <input type="text" id="soal3">
            <button data-answer="Untuk menjaga hubungan yang baik">Cek Jawaban</button>
        </div>
    </main>

    <footer>
        <a href="budi-pekerti.html">Kembali ke Budi Pekerti</a>
        <a href="index.html">Kembali ke Menu Utama</a>
    </footer>

    <script src="script.js"></script>

</html>
