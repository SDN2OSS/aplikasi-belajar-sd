        <div class="soal">
            <label for="soal1">1. Apa yang dimaksud dengan daur air?</label>
            <input type="text" id="soal1">
            <button data-answer="Proses perputaran air di bumi">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal2">2. Apa itu ekosistem?</label>
            <input type="text" id="soal2">
            <button data-answer="Sistem kehidupan yang terdiri dari makhluk hidup dan lingkungan">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal3">3. Apa yang dimaksud dengan fotosintesis?</label>
            <input type="text" id="soal3">
            <button data-answer="Proses tumbuhan menghasilkan makanan dengan bantuan cahaya matahari">Cek Jawaban</button>
        </div>
    </main>
