<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendidikan Pancasila Kelas 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Pendidikan Pancasila Kelas 6</h1>
        <p>Kerjakan soal berikut:</p>
    </header>

    <main>
        <div class="soal">
            <label for="soal1">1. Sebutkan prinsip dari sila keempat Pancasila dalam kehidupan bernegara!</label>
            <input type="text" id="soal1">
            <button data-answer="Musyawarah untuk mufakat">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal2">2. Apa yang dimaksud dengan sila pertama dalam Pancasila dalam kehidupan beragama?</label>
            <input type="text" id="soal2">
            <button data-answer="Kebebasan beragama dan beribadah sesuai keyakinan masing-masing">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal3">3. Apa peran Pancasila dalam menjaga persatuan dan kesatuan bangsa?</label>
            <input type="text" id="soal3">
            <button data-answer="Pancasila menjadi dasar untuk mempererat persatuan Indonesia">Cek Jawaban</button>
        </div>
    </main>

    <footer>
        <a href="pendidikan-pancasila.html">Kembali ke Pendidikan Pancasila</a>
