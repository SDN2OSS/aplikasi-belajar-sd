<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Kelas 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Seni Kelas 1</h1>
        <p>Kerjakan soal berikut:</p>
    </header>

    <main>
        <div class="soal">
            <label for="soal1">1. Sebutkan 2 jenis alat musik tradisional!</label>
            <input type="text" id="soal1">
            <button data-answer="Gamelan, Angklung">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal2">2. Apa yang dimaksud dengan seni rupa?</label>
            <input type="text" id="soal2">
            <button data-answer="Seni yang menggunakan unsur visual seperti gambar dan patung">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal3">3. Apa yang kamu butuhkan untuk membuat gambar?</label>
            <input type="text" id="soal3">
            <button data-answer="Pensil, kertas, dan warna">Cek Jawaban</button>
        </div>
    </main>

    <footer>
        <a href="seni.html">Kembali ke Seni Budaya</a>
        <a href="index.html">Kembali ke Menu Utama</a>
    </footer>

</html>
