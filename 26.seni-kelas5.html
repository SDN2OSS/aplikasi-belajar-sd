<!DOCTYPE html>

    <header>
        <h1>Seni Kelas 5</h1>
        <p>Kerjakan soal berikut:</p>
    </header>

    <main>
        <div class="soal">
            <label for="soal1">1. Apa itu seni rupa 2 dimensi?</label>
            <input type="text" id="soal1">
            <button data-answer="Seni rupa yang hanya memiliki panjang dan lebar, seperti gambar dan lukisan">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal2">2. Sebutkan 3 contoh seni tari daerah!</label>
            <input type="text" id="soal2">
            <button data-answer="Tari Saman, Tari Pendet, Tari Jaipong">Cek Jawaban</button>
        </div>

        <div class="soal">
            <label for="soal3">3. Apa yang dimaksud dengan seni kriya?</label>
            <input type="text" id="soal3">
            <button data-answer="Seni yang membuat barang fungsional dan dekoratif, seperti kerajinan tangan">Cek Jawaban</button>
        </div>
    </main>
